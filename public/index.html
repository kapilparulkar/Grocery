<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<title>Grocery List</title>
<style>
:root { --bg: #f5f5f5; --card: #fff; --text: #333; --muted: #666; --border: #ddd; --green: #4CAF50; --orange: #ff9800; --red: #f44336; --blue: #2196F3; }
[data-theme="dark"] { --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; --muted: #aaa; --border: #444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 12px; max-width: 520px; margin: 0 auto; padding-bottom: 80px; transition: background .3s, color .3s; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
h1 { font-size: 1.4rem; }
.header-btns { display: flex; gap: 2px; }
.header-btns button { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 6px; }
.tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.tabs button { flex: 1; padding: 8px; border: none; border-radius: 8px; background: var(--card); color: var(--text); font-size: .85rem; cursor: pointer; border: 1px solid var(--border); transition: all .2s; }
.tabs button.active { background: var(--green); color: #fff; border-color: var(--green); }
.tab-content { display: none; } .tab-content.active { display: block; }

@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-100%); } }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

.search { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; font-size: 16px; background: var(--card); color: var(--text); transition: border-color .2s; }
.search:focus { border-color: var(--green); outline: none; }
.cat-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.cat-tabs::-webkit-scrollbar { height: 0; }
.cat-tab { padding: 6px 12px; border-radius: 20px; font-size: .75rem; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; white-space: nowrap; transition: all .2s; }
.cat-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
.cat-tab .count { opacity: .7; margin-left: 3px; }
.add-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.add-row input, .add-row select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--card); color: var(--text); }
.add-row input[name="name"] { flex: 2; min-width: 100px; }
.add-row input[name="qty"] { width: 55px; }
.add-row select { flex: 1; min-width: 90px; }
.add-btns { display: flex; gap: 6px; margin-bottom: 12px; }
.add-btns button { padding: 10px 14px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #fff; transition: transform .1s; }
.add-btns button:active { transform: scale(.95); }
.btn-add { background: var(--green); }
.btn-voice { background: var(--blue); }
.btn-bulk { background: var(--orange); }

.category-group { margin-bottom: 16px; animation: slideIn .3s ease; }
.category-title { font-size: .8rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.item { display: flex; align-items: center; background: var(--card); padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); position: relative; overflow: hidden; touch-action: pan-y; transition: transform .2s, opacity .3s, box-shadow .2s; animation: slideIn .3s ease; }
.item:active { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.item.removing { animation: slideOut .3s ease forwards; }
.item.popping { animation: pop .3s ease; }
.item.out { opacity: .5; }
.item .info { flex: 1; min-width: 0; }
.item .name { font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item.out .name { text-decoration: line-through; }
.item button { padding: 6px 10px; border: none; border-radius: 6px; font-size: .78rem; cursor: pointer; margin-left: 3px; transition: transform .1s; }
.item button:active { transform: scale(.9); }
.qty-ctrl { display: flex; align-items: center; gap: 4px; margin-left: 6px; }
.qty-ctrl button { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--text); font-size: 1rem; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; font-weight: bold; }
.qty-ctrl span { font-size: .85rem; min-width: 18px; text-align: center; }
.btn-toggle { background: var(--orange); color: #fff; }
.item.out .btn-toggle { background: var(--green); }
.btn-del { background: var(--red); color: #fff; display: none; }
.delete-mode .item .btn-del { display: inline-block; }
.btn-del-mode { background: var(--red); }
.btn-del-mode.active { background: #b71c1c; box-shadow: 0 0 0 2px var(--red); }

.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: .9rem; z-index: 999; display: none; align-items: center; gap: 10px; animation: slideIn .3s ease; }
.toast.show { display: flex; }
.toast button { background: var(--orange); color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }

.shopping-item { display: flex; align-items: center; background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 6px; transition: opacity .3s, transform .3s; }
.shopping-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--green); }
.shopping-item.checked { opacity: .5; transform: scale(.98); }
.shopping-item.checked .name { text-decoration: line-through; color: var(--muted); }
.shopping-done { padding: 12px; background: var(--green); color: #fff; border: none; border-radius: 8px; width: 100%; font-size: 1rem; cursor: pointer; margin-top: 12px; transition: transform .1s; }
.shopping-done:active { transform: scale(.98); }

.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
.modal.show { display: flex; }
.modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; animation: slideIn .2s ease; }
.modal-content h3 { margin-bottom: 12px; }
.modal-content textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--bg); color: var(--text); height: 120px; resize: vertical; font-family: inherit; }
.modal-content select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--bg); color: var(--text); }
.modal-content .btns { display: flex; gap: 8px; }
.modal-content .btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }

.notif-bar { background: var(--orange); color: #fff; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: .85rem; display: none; animation: slideIn .3s ease; }
.notif-bar.show { display: block; }
.voice-active { animation: shake .5s ease infinite; background: var(--red) !important; }

.swipe-bg { position: absolute; top: 0; bottom: 0; width: 100%; display: flex; align-items: center; padding: 0 16px; font-size: .8rem; color: #fff; font-weight: 600; pointer-events: none; opacity: 0; transition: opacity .2s; }
.swipe-bg.left { right: 0; justify-content: flex-end; background: linear-gradient(to left, var(--orange), transparent); }
.swipe-bg.right { left: 0; justify-content: flex-start; background: linear-gradient(to right, var(--green), transparent); }
</style>
</head>
<body>
<header>
  <h1>🛒 Grocery List</h1>
  <div class="header-btns">
    <button onclick="shareList()" title="Share list">🔗</button>
    <button onclick="toggleTheme()" title="Toggle dark mode">🌓</button>
  </div>
</header>

<div class="notif-bar" id="notif"></div>

<div class="tabs">
  <button class="active" onclick="switchTab('list')">📋 List</button>
  <button onclick="switchTab('shop')">🛍️ Shop</button>
</div>

<!-- LIST TAB -->
<div class="tab-content active" id="tab-list">
  <input class="search" placeholder="Search items..." oninput="render()">
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="add-row">
    <input name="name" id="inp-name" placeholder="Add item..." autocomplete="off">
    <input name="qty" id="inp-qty" type="number" min="1" value="1" placeholder="#">
    <select id="inp-cat">
      <option>Produce</option><option>Dairy</option><option>Meat</option><option>Bakery</option><option>Frozen</option><option>Beverages</option><option>Snacks</option><option>Household</option><option>Personal Care</option><option selected>Other</option>
    </select>
  </div>
  <div class="add-btns">
    <button class="btn-add" onclick="addItem()">➕ Add</button>
    <button class="btn-voice" id="voiceBtn" onclick="voiceInput()">🎤 Voice</button>
    <button class="btn-bulk" onclick="openBulk()">📝 Bulk</button>
    <button class="btn-del-mode" id="delBtn" onclick="toggleDeleteMode()">🗑️ Delete</button>
  </div>
  <div id="list"></div>
</div>

<!-- SHOPPING TAB -->
<div class="tab-content" id="tab-shop">
  <p style="color:var(--muted);font-size:.85rem;margin-bottom:10px">Check off items as you shop. Hit "Done" to restock checked items.</p>
  <div id="shop-list"></div>
  <button class="shopping-done" onclick="doneShop()">✅ Done Shopping - Restock Checked</button>
</div>

<!-- BULK ADD MODAL -->
<div class="modal" id="bulkModal">
  <div class="modal-content">
    <h3>Bulk Add Items</h3>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">One item per line</p>
    <textarea id="bulk-text" placeholder="Milk&#10;Eggs&#10;Bread&#10;Butter"></textarea>
    <select id="bulk-cat">
      <option>Produce</option><option>Dairy</option><option>Meat</option><option>Bakery</option><option>Frozen</option><option>Beverages</option><option>Snacks</option><option>Household</option><option>Personal Care</option><option selected>Other</option>
    </select>
    <div class="btns">
      <button type="button" style="background:var(--muted);color:#fff" onclick="closeModal('bulkModal')">Cancel</button>
      <button type="button" style="background:var(--green);color:#fff" onclick="bulkAdd()">Add All</button>
    </div>
  </div>
</div>

<!-- TOAST (undo) -->
<div class="toast" id="toast">
  <span id="toast-msg"></span>
  <button onclick="undoDelete()">Undo</button>
</div>

<script>
let items = [];
let lastDeleted = null;
let toastTimer = null;
let activeCat = 'All';
let recognition = null;

const catOrder = ['Produce','Dairy','Meat','Bakery','Frozen','Beverages','Snacks','Household','Personal Care','Other'];

// Haptic
function haptic(style = 'light') {
  if (navigator.vibrate) {
    const p = { light: 10, medium: 25, heavy: 50, success: [10, 50, 10] };
    navigator.vibrate(p[style] || 10);
  }
}

// Theme
function toggleTheme() {
  haptic();
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
}
(function(){ const t = localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme', t); })();

// Tabs
function switchTab(tab) {
  haptic();
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'shop') renderShop();
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function selectCat(cat) { haptic(); activeCat = cat; render(); }

function toggleDeleteMode() {
  haptic();
  const list = document.getElementById('tab-list');
  const btn = document.getElementById('delBtn');
  list.classList.toggle('delete-mode');
  btn.classList.toggle('active');
}

// API
async function api(url, opts) {
  try {
    const r = await fetch(url, opts);
    return await r.json();
  } catch(e) { showNotif('⚠️ Server unreachable'); return null; }
}

async function load() {
  const data = await api('/api/items');
  if (data) { items = data; render(); }
}

function render() {
  const search = document.querySelector('.search').value.toLowerCase();
  const filtered = items.filter(it => !search || it.name.toLowerCase().includes(search));

  const categories = {};
  filtered.forEach(it => {
    const cat = it.category || 'Other';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(it);
  });

  // Category tabs
  let tabsHtml = `<div class="cat-tab${activeCat==='All'?' active':''}" onclick="selectCat('All')">All<span class="count">${filtered.length}</span></div>`;
  for (const cat of catOrder) {
    if (categories[cat]) {
      tabsHtml += `<div class="cat-tab${activeCat===cat?' active':''}" onclick="selectCat('${cat}')">${cat}<span class="count">${categories[cat].length}</span></div>`;
    }
  }
  document.getElementById('cat-tabs').innerHTML = tabsHtml;

  const sortedCats = Object.keys(categories).sort((a,b) => catOrder.indexOf(a) - catOrder.indexOf(b));
  const visibleCats = activeCat === 'All' ? sortedCats : sortedCats.filter(c => c === activeCat);

  let html = '';
  for (const cat of visibleCats) {
    const catItems = categories[cat].sort((a,b) => b.in_stock - a.in_stock || a.name.localeCompare(b.name));
    html += `<div class="category-group"><div class="category-title">${esc(cat)} (${catItems.length})</div>`;
    for (const it of catItems) {
      const cls = it.in_stock ? '' : ' out';
      const toggleLabel = it.in_stock ? 'Out' : '✓';
      html += `<div class="item${cls}" data-id="${it.id}">
        <div class="swipe-bg left">◀ Out</div>
        <div class="swipe-bg right">Restock ▶</div>
        <div class="info"><div class="name">${esc(it.name)}</div></div>
        <div class="qty-ctrl">
          <button onclick="changeQty(${it.id},${it.quantity - 1})">−</button>
          <span>${it.quantity}</span>
          <button onclick="changeQty(${it.id},${it.quantity + 1})">+</button>
        </div>
        <button class="btn-toggle" onclick="toggle(${it.id})">${toggleLabel}</button>
        <button class="btn-del" onclick="del(${it.id})">✕</button>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('list').innerHTML = html || '<p style="text-align:center;color:var(--muted);margin-top:40px">No items yet. Add something above!</p>';
}

// CRUD
async function addItem() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').style.animation = 'shake .4s'; setTimeout(() => document.getElementById('inp-name').style.animation = '', 400); return; }
  haptic('success');
  const qty = parseInt(document.getElementById('inp-qty').value) || 1;
  const cat = document.getElementById('inp-cat').value;
  const data = await api('/api/items', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name, quantity: qty, category: cat}) });
  if (data) { items.push(data); render(); }
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-qty').value = '1';
}

async function toggle(id) {
  haptic('medium');
  const el = document.querySelector(`.item[data-id="${id}"]`);
  if (el) el.classList.add('popping');
  const data = await api(`/api/items/${id}/toggle`, { method: 'POST' });
  if (data) { const idx = items.findIndex(i => i.id === id); if (idx >= 0) items[idx] = data; setTimeout(render, 200); }
}

async function changeQty(id, newQty) {
  if (newQty < 0) return;
  haptic();
  const updates = { quantity: newQty };
  if (newQty === 0) updates.in_stock = false;
  const data = await api(`/api/items/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updates) });
  if (data) { const idx = items.findIndex(i => i.id === id); if (idx >= 0) items[idx] = data; render(); }
}

async function del(id) {
  haptic('heavy');
  const el = document.querySelector(`.item[data-id="${id}"]`);
  const item = items.find(i => i.id === id);
  if (el) el.classList.add('removing');
  lastDeleted = item;
  await new Promise(r => setTimeout(r, 250));
  await api(`/api/items/${id}`, { method: 'DELETE' });
  items = items.filter(i => i.id !== id);
  render();
  showToast(`"${item.name}" deleted`);
}

async function undoDelete() {
  if (!lastDeleted) return;
  haptic();
  const { id, ...rest } = lastDeleted;
  const data = await api('/api/items', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(rest) });
  if (data) { items.push(data); render(); }
  lastDeleted = null;
  hideToast();
}

// Bulk
function openBulk() { haptic(); document.getElementById('bulkModal').classList.add('show'); }
async function bulkAdd() {
  const text = document.getElementById('bulk-text').value.trim();
  if (!text) return;
  haptic('success');
  const cat = document.getElementById('bulk-cat').value;
  const data = await api('/api/items/bulk', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({items: text, category: cat}) });
  if (data) { items.push(...data); render(); showNotif(`✅ Added ${data.length} items`); }
  document.getElementById('bulk-text').value = '';
  closeModal('bulkModal');
}

// Voice
function voiceInput() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { showNotif('⚠️ Voice not supported'); return; }
  const btn = document.getElementById('voiceBtn');
  if (recognition) { recognition.stop(); return; }
  haptic('medium');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  btn.classList.add('voice-active');
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const match = text.match(/(?:add\s+)?(\d+)?\s*(.+?)(?:\s+to\s+(.+))?$/i);
    if (match) {
      document.getElementById('inp-name').value = match[2].trim();
      if (match[1]) document.getElementById('inp-qty').value = match[1];
      if (match[3]) {
        const sel = document.getElementById('inp-cat');
        for (let opt of sel.options) { if (opt.value.toLowerCase() === match[3].trim().toLowerCase()) { sel.value = opt.value; break; } }
      }
      addItem();
    }
    haptic('success');
  };
  recognition.onend = () => { btn.classList.remove('voice-active'); recognition = null; };
  recognition.onerror = () => { btn.classList.remove('voice-active'); recognition = null; showNotif('⚠️ Voice failed'); };
  recognition.start();
}

// Shopping mode
function renderShop() {
  const outItems = items.filter(it => !it.in_stock);
  let html = '';
  if (!outItems.length) { html = '<p style="color:var(--muted);text-align:center;margin-top:30px">All items in stock! 🎉</p>'; }
  outItems.forEach(it => {
    html += `<div class="shopping-item"><input type="checkbox" data-id="${it.id}"><div class="info"><div class="name">${esc(it.name)}</div><div style="font-size:.75rem;color:var(--muted)">${it.category} · Qty: ${it.quantity}</div></div></div>`;
  });
  document.getElementById('shop-list').innerHTML = html;
  document.querySelectorAll('.shopping-item input').forEach(cb => {
    cb.addEventListener('change', function() { haptic(); this.closest('.shopping-item').classList.toggle('checked', this.checked); });
  });
}

async function doneShop() {
  const ids = [...document.querySelectorAll('.shopping-item input:checked')].map(cb => parseInt(cb.dataset.id));
  if (!ids.length) return;
  haptic('success');
  await api('/api/items/bulk-restock', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ids}) });
  items.forEach(it => { if (ids.includes(it.id)) it.in_stock = true; });
  renderShop();
  showNotif(`✅ ${ids.length} item(s) restocked!`);
}

// Share
function shareList() {
  haptic();
  if (navigator.share) {
    navigator.share({ title: 'Grocery List', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showNotif('📋 Link copied!');
  }
}

// Notifications
function showNotif(msg) { const el = document.getElementById('notif'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
function showToast(msg) { document.getElementById('toast-msg').textContent = msg; document.getElementById('toast').classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(hideToast, 5000); }
function hideToast() { document.getElementById('toast').classList.remove('show'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Auto-refresh every 5s
setInterval(load, 5000);

// Keyboard
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// Swipe support
let touchStartX = 0, touchItem = null;
document.addEventListener('touchstart', e => { const item = e.target.closest('.item'); if (!item || e.target.closest('button')) return; touchStartX = e.touches[0].clientX; touchItem = item; });
document.addEventListener('touchend', e => {
  if (!touchItem) return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) { const id = parseInt(touchItem.dataset.id); haptic('medium'); toggle(id); }
  touchItem.style.transform = ''; touchItem.querySelectorAll('.swipe-bg').forEach(el => el.style.opacity = '0'); touchItem = null;
});
document.addEventListener('touchmove', e => {
  if (!touchItem) return;
  const diff = e.touches[0].clientX - touchStartX;
  if (Math.abs(diff) > 20) {
    touchItem.style.transform = `translateX(${diff * 0.4}px)`;
    if (diff < -40) touchItem.querySelector('.swipe-bg.left').style.opacity = '1'; else touchItem.querySelector('.swipe-bg.left').style.opacity = '0';
    if (diff > 40 && touchItem.classList.contains('out')) touchItem.querySelector('.swipe-bg.right').style.opacity = '1'; else if(touchItem.querySelector('.swipe-bg.right')) touchItem.querySelector('.swipe-bg.right').style.opacity = '0';
  }
});

// PWA
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

// Init
load();
</script>
</body>
</html>
