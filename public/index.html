<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<style>
body { margin: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
.spinner { width: 36px; height: 36px; border: 3px solid #ddd; border-top-color: #4CAF50; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
// Check if user has a valid session token
const token = localStorage.getItem('sb_token');
if (token) {
  // Verify token is still valid
  fetch('/api/auth/me', {
    headers: { 'Authorization': `Bearer ${token}` }
  }).then(r => r.json()).then(data => {
    if (data && data.member) {
      window.location.href = '/app.html';
    } else {
      localStorage.removeItem('sb_token');
      window.location.href = '/auth.html';
    }
  }).catch(() => window.location.href = '/auth.html');
} else {
  window.location.href = '/auth.html';
}
</script>
</body>
</html>
